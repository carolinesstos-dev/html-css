<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio tabela mesclada</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        caption {
            width: 600px;
            font-size: 1em;
            font-weight: bold;
            padding: 10px;
        }

        table {
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
        }

        th , td#titulo {
            background-color: grey;
        }
    </style>
</head>
<body>
    <h1>Desafio tabelas</h1>
    <table>
        <caption>
            Notas por disciplina
        </caption>
        <thead>
            <tr>
                <th id="titulo" rowspan="2" scope="col">Área</th>
                <th id="titulo" rowspan="2" scope="col">Disciplinas</th>
                <th id="titulo" colspan="2"  scope="colgroup">Notas</th>
                <th id="titulo" colspan="1" rowspan="2" scope="colgroup">Média</th>
            </tr>
            <tr>
              <td id="titulo" colspan="1">Nota 1</td>
              <td id="titulo" colspan="1">Nota 2</td>
            </tr>
            <tbody>
                <tr>
                    <td rowspan="4"><b>Exatas</b></td>
                    <td>Matemática</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                </tr>
                <tr>
                    <td>Física</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                </tr>
                <tr>
                    <td>Química</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                </tr>
                <tr>
                    <td>Biologia</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                </tr>
                <tr>
                    <th id="titulo" colspan="5" scope="colgroup">Média de exatas</th>
                </tr>
                <tr>
                    <td rowspan="2"><b>Humanas</b></td>
                    <td>História</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                </tr>
                <tr>
                    <td>Geografia</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                </tr>
                <tr>
                    <th id="titulo" colspan="5">Média de Humanas</th>
                </tr>
            </tbody>
        </thead>
    </table>
</body>
</html>
