<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Página de links de Caaroline Sousa dos santos, desenvolvedora frontend. Conecte-se comigo através do WhatsApp, LinkedIn e TikTok.">
    <title>Caroline Sousa dos Santos</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome para icones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <!-- Google fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #520e92;
            --secondary-color: #a6a4d6;
            --accent: #4cc9f0;
            --dark: #5f2694;
            --light: #1d1e2c;
            --success: #4ade80;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--primary-color), var(--light));
            color: var(--secondary-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: 20px;
            padding-bottom: 60px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* Estilo do cabeçalho*/
        .profile-container {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeIn 1s ease;
        }

        .profile-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid var(--accent);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--light), var(--success));
            display: block;
            align-items: center;
            justify-content: center;
            color: var(--light);
            font-size: 60px;
        }

        .profile-name {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--accent), var(--success));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .profile-title {
            font-size: 1.1rem;
            color: #f0cc03;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /*Estilo dos links*/
        .links-container {
            margin-bottom: 40px;
        }

        .link-card {
            display: flex;
            align-items: center;
            background-color: rgba(225, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 15px;
            text-decoration: none;
            color: var(--light);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .link-card:hover {
            transform: translateY(-5px);
            background: rgba(67, 97, 238, 0.2);
            border: 1px solid rgba(76, 201, 254, 0.3);
        }

        .link-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            font-size: 24px;
            transition: all 0.3s ease;
        }

        .link-card:hover .link-icon {
            transform: scale(1.1);
        }

        .whatsapp {background: linear-gradient(135deg, #25D366, #128C7E);}
        .linkedin {background: linear-gradient(135deg, #0077B5, #005983);}
        .tiktok {background: linear-gradient(135deg, #696969, #010101);}
            
        .link-text {
            font-size: 1rem;
        }

        .link-title {
            font-weight:500;
            font-size: 1.1rem;
            margin-bottom: 3px;
        }

        .link-subtitle {
            font-size: 0.85rem;
            color: #b0b0d1;
            font-weight: 300;
        }

        /*Rodapé*/
        .footer {
            text-align: center;
            padding: 25px 0;
            margin-top: auto;
            position: relative;
        }

        .footer::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateY(-50%);
            width: 80%;
            height: 1px;
            background-color: rgba(255, 255, 255, 0.1)
        }

        .footer-text {
            font-size: 0.9rem;
            color: #b0b0d1;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .social-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(27, 1, 48, 0.8);
            color: var(--success);
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .social-icon:hover {
            background: var(--accent);
            color:white;
            transform: translateY(-3px);
        }

        .copyright {
            font-size: 0.8rem;
            color: #8a8aa8;
            margin-top: 20px;
        }

            /*Animações*/
            @keyframes fadeIn {
                from {opacity: 0; transform: translateY(10px);}
                to {opacity: 1; transform: translateY(0);}
            }

            .link-card:nth-child(1) {animation-delay: 0.1s;}
            .link-card:nht-child(2) {animation-delay: 0.2s;}
            .link-card:nht-child(3) {animation-delay: 0.3s;}

            /* Responsividade */
            @media (max-width: 576px) {
                .profile-image {
                    width: 120px;
                    height: 120px;
                    font-size: 50px;
                }

                .profile-name {
                    font-size: 1.8rem;
                }

                .link-icon {
                    width: 30px;
                    height: 50px;
                    margin-right: 30px;
                }
            }   
    </style>
</head>
